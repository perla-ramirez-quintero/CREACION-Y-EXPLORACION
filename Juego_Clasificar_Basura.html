<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>¡A Limpiar el Parque!</title>
    <!-- CSS integrado para tener todo en un solo archivo -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700&display=swap');

        body {
            margin: 0;
            padding: 0;
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(to bottom, #87CEEB 0%, #87CEEB 50%, #7CFC00 50%, #32CD32 100%);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            touch-action: none; /* Crucial: Evita que la pantalla haga scroll al arrastrar en moviles/tablets */
        }

        #header {
            text-align: center;
            margin-top: 20px;
            color: white;
            text-shadow: 2px 2px 0px #444, -1px -1px 0px #444;
            z-index: 10;
        }

        h1 {
            font-family: 'Fredoka One', cursive;
            font-size: 3rem;
            margin: 10px 0;
            animation: float 3s ease-in-out infinite;
        }

        p.subtitle {
            font-size: 1.5rem;
            margin: 0;
            background: rgba(255, 255, 255, 0.85);
            color: #333;
            padding: 8px 25px;
            border-radius: 20px;
            text-shadow: none;
            display: inline-block;
            border: 3px dashed #4CAF50;
        }

        #game-area {
            flex-grow: 1;
            width: 100%;
            position: relative;
        }

        #bins-container {
            position: absolute;
            bottom: 5%;
            width: 100%;
            display: flex;
            justify-content: space-evenly;
            align-items: flex-end;
            pointer-events: none; /* Los botes no capturan los eventos del mouse directamente */
        }

        .bin {
            width: 35vw;
            max-width: 200px;
            height: 25vh;
            max-height: 220px;
            border-radius: 15px 15px 30px 30px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Fredoka One', cursive;
            font-size: 1.6rem;
            color: white;
            text-shadow: 2px 2px 2px rgba(0,0,0,0.5);
            box-shadow: 0 15px 0px rgba(0,0,0,0.3), inset 0 10px 20px rgba(255,255,255,0.2);
            transition: transform 0.2s;
        }

        .bin-organic { background-color: #4CAF50; border: 6px solid #2E7D32; }
        .bin-inorganic { background-color: #607D8B; border: 6px solid #455A64; }

        .bin-icon {
            font-size: 4.5rem;
            margin-bottom: 5px;
            filter: drop-shadow(0 5px 5px rgba(0,0,0,0.3));
        }

        .item {
            position: absolute;
            font-size: 4.5rem;
            cursor: grab;
            user-select: none;
            filter: drop-shadow(0px 8px 5px rgba(0,0,0,0.4));
            transition: transform 0.15s ease-out; /* Transicion suave al soltar */
            touch-action: none;
            pointer-events: auto;
        }

        .item:hover { transform: scale(1.15); }
        .item:active { cursor: grabbing; }

        /* Activar esta clase cuando el niño tiene presionado el elemento */
        .item.dragging {
            z-index: 1000 !important;
            transform: scale(1.3) rotate(-10deg) !important;
            transition: none !important; /* Quitar transicion mientras arrastra para seguir al dedo sin lag */
            filter: drop-shadow(0px 15px 15px rgba(0,0,0,0.5));
        }

        /* Animaciones divertidas */
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes bounce-bin {
            0% { transform: scale(1); }
            50% { transform: scale(1.1) translateY(-15px); }
            100% { transform: scale(1); }
        }
        .bounce { animation: bounce-bin 0.5s ease-out; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-15px) rotate(-10deg); }
            40%, 80% { transform: translateX(15px) rotate(10deg); }
        }
        .wrong-shake { animation: shake 0.5s ease-in-out; }

        /* Confeti para la victoria */
        .confetti {
            position: absolute;
            width: 15px;
            height: 15px;
            z-index: 2000;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(120vh) rotate(1080deg); opacity: 0; }
        }

        #win-message {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 40px;
            border-radius: 40px;
            text-align: center;
            border: 8px solid #FFC107;
            box-shadow: 0 25px 60px rgba(0,0,0,0.6);
            display: none;
            z-index: 5000;
            width: 80%;
            max-width: 500px;
        }
        #win-message h2 { font-family: 'Fredoka One'; color: #FF9800; font-size: 3.5rem; margin: 0; text-shadow: 2px 2px #fff, 4px 4px #ccc;}
        #btn-restart {
            margin-top: 30px;
            padding: 15px 40px;
            font-size: 1.8rem;
            font-family: 'Fredoka One';
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 0 #2E7D32;
            transition: transform 0.1s, box-shadow 0.1s;
        }
        #btn-restart:active {
            transform: translateY(8px);
            box-shadow: 0 0 0 #2E7D32;
        }

    </style>
</head>
<body>

    <div id="header">
        <h1>¡A Limpiar el Parque!</h1>
        <p class="subtitle">Arrastra la basura a su bote correcto</p>
    </div>

    <div id="game-area">
        <div id="bins-container">
            <!-- Bote Orgánico -->
            <div id="bin-organic" class="bin bin-organic" data-type="organic">
                <div class="bin-icon">🌿</div>
                Orgánica
            </div>
            <!-- Bote Inorgánico -->
            <div id="bin-inorganic" class="bin bin-inorganic" data-type="inorganic">
                <div class="bin-icon">♻️</div>
                Inorgánica
            </div>
        </div>
        
        <!-- Elementos generados por JavaScript aparecerán aquí -->
    </div>

    <!-- Pantalla de victoria -->
    <div id="win-message">
        <h2>¡Parque Limpio!</h2>
        <p style="font-size: 2.2rem; font-weight: bold; margin-top:20px; color: #444;">¡Eres un héroe del planeta! 🌍</p>
        <button id="btn-restart" onclick="location.reload()">♻️ Jugar de Nuevo</button>
    </div>

    <!-- JS Inicia Aquí (Mismo Archivo) -->
    <script>
        // --- 1. CONFIGURACIÓN DEL JUEGO ---
        const trashes = [
            { type: 'organic', icon: '🥚', name: 'cascarones de huevo' },
            { type: 'organic', icon: '🦴', name: 'hueso de pollito' },
            { type: 'organic', icon: '🍂', name: 'hojita seca' },
            { type: 'organic', icon: '🍉', name: 'cáscara de sandía' },
            { type: 'inorganic', icon: '🔋', name: 'pila gastada' },
            { type: 'inorganic', icon: '🧃', name: 'cajita de jugo' },
            { type: 'inorganic', icon: '🥫', name: 'lata de refresco' },
            { type: 'inorganic', icon: '🛍️', name: 'bolsa de plástico' }
        ];

        let itemsRemaining = trashes.length;
        const gameArea = document.getElementById('game-area');
        const bins = document.querySelectorAll('.bin');
        const synth = window.speechSynthesis;

        // --- 2. VARIABLES DE DRAG & DROP TÁCTIL (Y MOUSE) ---
        let draggedItem = null;
        let startX = 0, startY = 0;
        let initialLeft = 0, initialTop = 0;

        // --- 3. INICIAR EL JUEGO (CREAR BASURITA AL AZAR) ---
        function initGame() {
            // Fuerza la carga de voces (evita bugs en algunos navegadores)
            if(speechSynthesis.onvoiceschanged !== undefined) {
                speechSynthesis.onvoiceschanged = () => {};
            }

            trashes.forEach((trash, index) => {
                const el = document.createElement('div');
                el.className = 'item';
                el.dataset.type = trash.type;
                el.dataset.name = trash.name;
                el.innerText = trash.icon;
                
                // Ubicacion al azar en la parte superior/media de la pantalla
                // Ancho de 5% a 85% para no salir del borde
                // Altura de 20% a 55% para que no tape los botes ni el título
                const randomX = 5 + Math.random() * 80;
                const randomY = 20 + Math.random() * 35;
                
                el.style.left = `${randomX}vw`;
                el.style.top = `${randomY}vh`;
                
                // Guardamos su origen por si el niño se equivoca y el objeto tiene que "rebotar" de vuelta a su lugar
                el.dataset.originX = `${randomX}vw`;
                el.dataset.originY = `${randomY}vh`;
                
                // Estos eventos Pointer detectan igual el dedo en el iPad y el ratón en la computadora
                el.addEventListener('pointerdown', startDrag);
                el.addEventListener('dragstart', (e) => e.preventDefault()); // Evitar comportamiento zombie por defecto
                
                gameArea.appendChild(el);
            });
        }

        // --- 4. FUNCIONES DE ARRASTRAR ---
        function startDrag(e) {
            draggedItem = e.target;
            draggedItem.classList.add('dragging'); // Le da el efecto de que se levanta y se hace grande
            
            startX = e.clientX;
            startY = e.clientY;
            
            // Su posición actual renderizada en píxeles  
            initialLeft = draggedItem.offsetLeft;
            initialTop = draggedItem.offsetTop;

            // Poner los auditores de movimiento en la ventana por si mueven el dedo muy rapido fuera del emoji
            window.addEventListener('pointermove', onDrag, {passive: false});
            window.addEventListener('pointerup', endDrag);

            // Audio cuando apenas lo toca (le lee el nombre)
            speak(draggedItem.dataset.name);
            playSound('pop'); // Sonidito lindo
        }

        function onDrag(e) {
            if (!draggedItem) return;
            e.preventDefault(); // Detiene scroll o comportamientos default tactiles
            
            const dx = e.clientX - startX;
            const dy = e.clientY - startY;
            
            draggedItem.style.left = `${initialLeft + dx}px`;
            draggedItem.style.top = `${initialTop + dy}px`;
        }

        function endDrag(e) {
            window.removeEventListener('pointermove', onDrag);
            window.removeEventListener('pointerup', endDrag);
            
            if (!draggedItem) return;
            draggedItem.classList.remove('dragging');

            // --- 5. DETECTAR SI SOLTÓ EN UN BOTE ---
            const itemRect = draggedItem.getBoundingClientRect(); // Caja del objeto (Top, bottom, left, right)
            let droppedBin = null;

            bins.forEach(bin => {
                const binRect = bin.getBoundingClientRect(); // Caja del bote de basura evaluado
                
                // Condicion basica de que se esten tocando ambas cajas (Colision)
                if (
                    itemRect.left < binRect.right &&
                    itemRect.right > binRect.left &&
                    itemRect.top < binRect.bottom &&
                    itemRect.bottom > binRect.top
                ) {
                    droppedBin = bin; // ¡Hubo contacto!
                }
            });

            // LÓGICA DE JUEGO (ACIERTOS Y ERRORES)
            if (droppedBin) {
                // Checa las etiquetas ocultas 'data-type' ("organic" vs "inorganic")
                if (droppedBin.dataset.type === draggedItem.dataset.type) {
                    handleCorrectDrop(draggedItem, droppedBin);
                } else {
                    handleWrongDrop(draggedItem, droppedBin);
                }
            } else {
                // Lo soltó lejos de los botes (en el aire/pasto)
                returnToOrigin(draggedItem);
            }

            draggedItem = null;
        }

        // --- 6. MANEJO DE RESULTADOS DE CAIDA ---
        function handleCorrectDrop(item, bin) {
            playSound('correct');
            const binName = bin.dataset.type === 'organic' ? 'Orgánica' : 'Inorgánica';
            speak(`¡Muy bien, ${item.dataset.name} va allí!`); // Feedback de voz  positivo
            
            // Animacion feliz del bote
            bin.classList.add('bounce');
            setTimeout(() => bin.classList.remove('bounce'), 500);

            // Desaparecer el elemento al interior del bote
            item.style.transition = 'all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
            // Lo encogemos rapidisimo hacia abajo como si entrara
            item.style.transform = 'scale(0) translateY(50px)';
            item.style.opacity = '0';
            
            setTimeout(() => {
                item.remove();
                itemsRemaining--;
                checkWin();
            }, 400);
        }

        function handleWrongDrop(item, bin) {
            playSound('wrong');
            speak(`¡Oh no! La ${item.dataset.name} no va en ese bote.`);
            
            // Animacion enfadada del bote
            bin.classList.add('wrong-shake');
            setTimeout(() => bin.classList.remove('wrong-shake'), 500);

            returnToOrigin(item);
        }

        function returnToOrigin(item) {
            // Un efecto "elastico" de regreso a su lugar de origen original
            item.style.transition = 'left 0.6s ease-in-out, top 0.6s ease-in-out';
            item.style.left = item.dataset.originX;
            item.style.top = item.dataset.originY;
            
            // Le quitamos la transicion CSS luego para que si lo arrastra otra vez, no tenga un retraso visual
            setTimeout(() => {
                if(item && !item.classList.contains('dragging')) {
                    item.style.transition = 'transform 0.15s ease-out';
                }
            }, 600);
        }

        // --- 7. VERIFICAR VICTORIA ---
        function checkWin() {
            if (itemsRemaining === 0) {
                playSound('win');
                speak('¡Perfecto! Eres genial limpiando. Haz acabado todito.');
                // Mostrar cuadro de fin del juego
                document.getElementById('win-message').style.display = 'block';
                // ¡Fiesta!
                generateConfetti();
            }
        }

        // --- 8. GENERAR Y DISPARAR AUDIO Y LUCES ---
        // SINTESIS DE VOZ (Texto a hablador)
        function speak(text) {
            synth.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'es-MX';
            utterance.rate = 1.0;
            utterance.pitch = 1.4; // Vocecita mas aguda y chistosa
            
            // Tratar de asignar una voz calida (de mujer o niña) si esta instalada en la compu
            const femaleVoice = synth.getVoices().find(v => v.lang.includes('es') && (v.name.includes('Female') || v.name.includes('Mujer') || v.name.includes('Sabina')));
            if(femaleVoice) utterance.voice = femaleVoice;
            
            synth.speak(utterance);
        }

        // WEB AUDIO API (Para generar ruiditos retro sin archivos externos mps)
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            if (type === 'pop') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(500, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1000, audioCtx.currentTime + 0.1);
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start(audioCtx.currentTime);
                osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'correct') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.15); // Ting! agudo
                gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.15);
            } else if (type === 'wrong') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(300, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(150, audioCtx.currentTime + 0.3); // Womp Womp
                gainNode.gain.setValueAtTime(0.4, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.3);
            } else if (type === 'win') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(600, audioCtx.currentTime + 0.2);
                osc.frequency.setValueAtTime(800, audioCtx.currentTime + 0.2);
                osc.frequency.linearRampToValueAtTime(1200, audioCtx.currentTime + 0.6); // Mini fanfarria subiendo
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.7);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.7);
            }
        }

        // CONFETI VISUAL DE CSS AL GANAR EL JUEGO
        function generateConfetti() {
            const colors = ['#f44336', '#e91e63', '#9c27b0', '#673ab7', '#3f51b5', '#2196f3', '#03a9f4', '#00bcd4', '#009688', '#4CAF50', '#FFEB3B', '#FF9800'];
            for (let i = 0; i < 70; i++) {
                const conf = document.createElement('div');
                conf.className = 'confetti';
                conf.style.left = (Math.random() * 100) + 'vw';
                // Escoger color aleatorio de la paleta alegre
                conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                
                // Duracion de caida
                const duration = Math.random() * 3 + 2; // entre 2s y 5s
                conf.style.animationDuration = duration + 's';
                conf.style.animationDelay = (Math.random() * 1.5) + 's'; // Desfase
                
                // Tamano aleatorio pequeño y grande
                const size = Math.random() * 15 + 10;
                conf.style.width = size + 'px';
                conf.style.height = (Math.random() * 20 > 10 ? size : size*1.5) + 'px'; // Confetis y serpentinas

                document.body.appendChild(conf);
                
                // Limpiar del DOM luego
                setTimeout(() => conf.remove(), (duration + 1.5) * 1000);
            }
        }

        // --- ARRANQUE OFICIAL ---
        window.onload = initGame;
    </script>
</body>
</html>
