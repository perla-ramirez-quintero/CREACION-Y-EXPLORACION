<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Animales Marinos!</title>
    <!-- Usamos una fuente de Google muy bonita y amigable para niños -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            /* Fondo de mar con gradiente */
            background: linear-gradient(180deg, #4facfe 0%, #00f2fe 100%);
            font-family: 'Fredoka One', cursive, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            /* Para las burbujas */
            position: relative;
        }

        h1 {
            color: white;
            /* Borde alrededor del texto para que resalte */
            text-shadow: 3px 3px 0px #0056b3, -2px -2px 0px #0056b3, 2px -2px 0px #0056b3, -2px 2px 0px #0056b3, 2px 2px 0px #0056b3;
            font-size: 3.5rem;
            margin-top: 2rem;
            text-align: center;
            z-index: 10;
            padding: 0 15px;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            max-width: 900px;
            padding: 20px;
            z-index: 10;
        }

        /* Tarjetas de los animales */
        .animal-card {
            background-color: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
            width: 140px;
            height: 140px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 5.5rem;
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            /* Quita el borde azul en móviles */
        }

        .animal-card:hover {
            transform: scale(1.15) translateY(-10px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
            background-color: #fff;
        }

        .animal-card:active {
            transform: scale(0.95);
        }

        /* Animación de burbujas en el fondo */
        .bubbles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .bubble {
            position: absolute;
            bottom: -100px;
            background-color: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            animation: rise infinite ease-in;
        }

        @keyframes rise {
            0% {
                bottom: -100px;
                transform: translateX(0);
            }

            50% {
                transform: translateX(50px);
            }

            100% {
                bottom: 110vh;
                /* Sube hasta salir de la pantalla */
                transform: translateX(-50px);
            }
        }

        /* Caja donde aparece el nombre del animal */
        #display-area {
            position: fixed;
            bottom: 5%;
            left: 50%;
            transform: translateX(-50%);
            background-color: #fff;
            padding: 15px 40px;
            border-radius: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            text-align: center;
            display: none;
            z-index: 20;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 6px solid #ffde00;
            /* Borde amarillo llamativo */
        }

        @keyframes popIn {
            0% {
                opacity: 0;
                transform: translate(-50%, 50px) scale(0.5);
            }

            100% {
                opacity: 1;
                transform: translate(-50%, 0) scale(1);
            }
        }

        #animal-name {
            font-size: 3.5rem;
            color: #ff5722;
            /* Color naranja bonito */
            margin: 0;
        }

        /* Pequeñas partículas de explosión al hacer clic */
        .particle {
            position: absolute;
            pointer-events: none;
            background-color: #fff;
            border-radius: 50%;
            animation: explode 0.8s ease-out forwards;
        }

        @keyframes explode {
            0% {
                transform: scale(1);
                opacity: 1;
            }

            100% {
                transform: scale(0);
                opacity: 0;
            }
        }

        @media (max-width: 600px) {
            .animal-card {
                width: 110px;
                height: 110px;
                font-size: 4rem;
            }

            h1 {
                font-size: 2.2rem;
            }

            #animal-name {
                font-size: 2.5rem;
            }
        }
    </style>
</head>

<body>

    <!-- Contenedor para las burbujas de fondo -->
    <div class="bubbles" id="bubbles-container"></div>

    <h1>¡Descubre los Animales Marinos!</h1>

    <div class="container">
        <!-- Emojis de los animales que los niños tocarán -->
        <div class="animal-card" onclick="playAnimal('Delfín', '¡iiii iiii iiii!', '🐬', event)">🐬</div>
        <div class="animal-card" onclick="playAnimal('Ballena', '¡Pffffff, fuuu!', '🐳', event)">🐳</div>
        <div class="animal-card" onclick="playAnimal('Tiburón', '¡Ñam, ñam, ñam!', '🦈', event)">🦈</div>
        <div class="animal-card" onclick="playAnimal('Cangrejo', '¡Clic, clic, clic, clic!', '🦀', event)">🦀</div>
        <div class="animal-card" onclick="playAnimal('Pulpo', '¡Glu, glu, glu!', '🐙', event)">🐙</div>
        <div class="animal-card" onclick="playAnimal('Pez Globo', '¡Puf, puf, me inflo!', '🐡', event)">🐡</div>
        <div class="animal-card" onclick="playAnimal('Tortuga', '¡Fiuuu, nadando lento!', '🐢', event)">🐢</div>
        <div class="animal-card" onclick="playAnimal('Foca', '¡Au, au, au!', '🦭', event)">🦭</div>
    </div>

    <!-- Donde se muestra el nombre -->
    <div id="display-area">
        <p id="animal-name"></p>
    </div>

    <script>
        // 1. Crear animaciones de burbujas en el fondo
        const bubblesContainer = document.getElementById('bubbles-container');
        for (let i = 0; i < 25; i++) {
            let bubble = document.createElement('div');
            bubble.classList.add('bubble');
            let size = Math.random() * 40 + 10;
            bubble.style.width = size + 'px';
            bubble.style.height = size + 'px';
            bubble.style.left = Math.random() * 100 + '%';
            bubble.style.animationDuration = (Math.random() * 8 + 4) + 's';
            bubble.style.animationDelay = (Math.random() * 5) + 's';
            bubblesContainer.appendChild(bubble);
        }

        // 2. Función principal cuando se toca el animal
        function playAnimal(name, soundWord, emoji, event) {
            // Cancelar cualquier voz que esté hablando para que no se amontonen
            window.speechSynthesis.cancel();

            // Mostrar el nombre en pantalla grande
            const displayArea = document.getElementById('display-area');
            const animalNameP = document.getElementById('animal-name');

            // Reiniciar la animación escondiendo y mostrando otra vez
            displayArea.style.display = 'none';
            void displayArea.offsetWidth; // truco para reiniciar la animación
            displayArea.style.display = 'block';

            animalNameP.textContent = name + " " + emoji;

            // Crear el efecto de partículas chiquitas donde se dio clic
            createParticles(event.clientX, event.clientY);

            // Hacer que la computadora hable (Nombre y Sonido)
            speak(name + "... " + soundWord);
        }

        // 3. Función para que el navegador hable (Text-to-Speech)
        function speak(text) {
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(text);

                // Configuración de la voz para que suene más divertida y en español
                utterance.lang = 'es-MX'; // Español de México si está disponible
                utterance.rate = 0.85; // Un poco más lento para los niños
                utterance.pitch = 1.3; // Más agudo (divertido)

                // Intentar asegurar una voz en español
                const voices = window.speechSynthesis.getVoices();
                let spanishVoice = voices.find(voice => voice.lang.includes('es-MX') || voice.lang.includes('es-ES') || voice.lang.includes('es'));
                if (spanishVoice) {
                    utterance.voice = spanishVoice;
                }

                window.speechSynthesis.speak(utterance);
            } else {
                console.log("Lo siento, tu navegador no soporta la función de hablar.");
            }
        }

        // 4. Función de partículas para hacer el clic más interactivo
        function createParticles(x, y) {
            for (let i = 0; i < 8; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                document.body.appendChild(particle);

                const size = Math.random() * 15 + 5;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.left = x + 'px';
                particle.style.top = y + 'px';

                const angle = Math.random() * Math.PI * 2;
                const distance = Math.random() * 60 + 30;
                const tx = Math.cos(angle) * distance;
                const ty = Math.sin(angle) * distance;

                // Animación usando JavaScript
                particle.animate([
                    { transform: 'translate(0,0) scale(1)', opacity: 1 },
                    { transform: `translate(${tx}px, ${ty}px) scale(0)`, opacity: 0 }
                ], {
                    duration: 600 + Math.random() * 400,
                    easing: 'cubic-bezier(0, .9, .57, 1)'
                }).onfinish = () => particle.remove();
            }
        }

        // Iniciar las voces temprano (truco para navegadores)
        if ('speechSynthesis' in window) {
            window.speechSynthesis.getVoices();
        }
    </script>
</body>

</html>
